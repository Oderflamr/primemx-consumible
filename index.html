<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeMX · Consumibles</title>
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root{
  --bg:#f5f5f2;
  --surface:#ffffff;
  --surface2:#f0efeb;
  --border:rgba(0,0,0,.08);
  --border2:rgba(0,0,0,.14);
  --text:#18180f;
  --text2:#6b6b62;
  --text3:#a3a398;
  --blue:#1a56db;
  --blue-bg:#eff4ff;
  --blue-text:#1e40af;
  --green:#166534;
  --green-bg:#f0fdf4;
  --green-text:#15803d;
  --amber:#92400e;
  --amber-bg:#fffbeb;
  --amber-text:#b45309;
  --red:#991b1b;
  --red-bg:#fef2f2;
  --red-text:#dc2626;
  --purple:#5b21b6;
  --purple-bg:#f5f3ff;
  --purple-text:#6d28d9;
  --teal:#134e4a;
  --teal-bg:#f0fdfa;
  --teal-text:#0f766e;
  --r:8px;--rl:12px;--rxl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.07);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111110;--surface:#1c1c1a;--surface2:#262623;
    --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
    --text:#f0efe8;--text2:#9a9a90;--text3:#636360;
    --blue-bg:#1e3a8a22;--blue-text:#93c5fd;
    --green-bg:#14532d22;--green-text:#86efac;
    --amber-bg:#78350f22;--amber-text:#fcd34d;
    --red-bg:#7f1d1d22;--red-text:#fca5a5;
    --purple-bg:#4c1d9522;--purple-text:#c4b5fd;
    --teal-bg:#134e4a22;--teal-text:#5eead4;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── LOGIN ───────────────────────────────────────── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:var(--bg);
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rxl);
  padding:40px;width:100%;max-width:380px;box-shadow:var(--shadow-md);
}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-logo .dot-mark{
  width:34px;height:34px;background:var(--blue);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
}
.login-logo .dot-mark svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round}
.login-logo .brand{font-size:17px;font-weight:700;letter-spacing:-.02em}
.login-logo .brand span{color:var(--text2);font-weight:400}
.login-card h2{font-size:20px;font-weight:700;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input{
  width:100%;height:40px;border:1px solid var(--border2);border-radius:var(--r);
  padding:0 12px;font-size:14px;background:var(--surface);color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.12)}
.login-error{
  background:var(--red-bg);color:var(--red-text);border:1px solid rgba(220,38,38,.2);
  border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;
}
.btn-login{
  width:100%;height:42px;background:var(--blue);color:#fff;border:none;
  border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;
}
.btn-login:hover{opacity:.9}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-hint{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);
  font-size:12px;color:var(--text3);text-align:center}

/* ── APP SHELL ───────────────────────────────────── */
#app-screen{display:none;min-height:100vh;flex-direction:column}
#app-screen.visible{display:flex}

.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;letter-spacing:-.01em}
.topbar-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.role-badge{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;letter-spacing:.03em;
}
.role-admin{background:var(--blue-bg);color:var(--blue-text)}
.role-proveedor{background:var(--amber-bg);color:var(--amber-text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-right .btn-logout{
  font-size:12px;color:var(--text2);background:none;border:1px solid var(--border2);
  border-radius:var(--r);padding:5px 12px;cursor:pointer;transition:all .15s;
}
.topbar-right .btn-logout:hover{background:var(--surface2);color:var(--text)}

.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR (admin only) ────────────────────────── */
.sidebar{
  width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;
}
.nav-label{
  font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;
  letter-spacing:.07em;padding:10px 10px 4px;
}
.nav-btn{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);
  font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;
  background:none;width:100%;text-align:left;transition:all .15s;
}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--blue-bg);color:var(--blue-text)}
.nav-btn svg{width:17px;height:17px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-spacer{flex:1}

/* ── MAIN CONTENT ────────────────────────────────── */
.main{flex:1;overflow-y:auto;padding:24px}

/* ── PAGE HEADER ─────────────────────────────────── */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.page-hdr-left h2{font-size:19px;font-weight:700;letter-spacing:-.02em}
.page-hdr-left p{font-size:13px;color:var(--text2);margin-top:2px}

/* ── METRIC CARDS ────────────────────────────────── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;box-shadow:var(--shadow)}
.mc-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.mc-value{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1}
.mc-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* ── CARD ────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-header h3{font-size:14px;font-weight:600}

/* ── FILTERS ─────────────────────────────────────── */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
select,input[type=text],input[type=date]{
  height:32px;border:1px solid var(--border2);border-radius:var(--r);padding:0 10px;
  font-size:13px;background:var(--surface);color:var(--text);outline:none;
  transition:border-color .15s;
}
select:focus,input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,86,219,.1)}

/* ── BUTTONS ─────────────────────────────────────── */
.btn{
  height:32px;padding:0 14px;border-radius:var(--r);font-size:13px;font-weight:500;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text);transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:#1648c0}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.success:hover{background:#14532d}
.btn.danger{color:var(--red-text);border-color:rgba(220,38,38,.3)}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{height:28px;padding:0 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ── TABLE ───────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;background:var(--surface);z-index:2}
th{
  padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);
  white-space:nowrap;
}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.actions{display:flex;gap:4px}

/* ── BADGES ──────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.b-abierto{background:var(--blue-bg);color:var(--blue-text)}
.b-enviado{background:var(--amber-bg);color:var(--amber-text)}
.b-entregado{background:var(--green-bg);color:var(--green-text)}
.b-cerrado{background:var(--surface2);color:var(--text2)}
.b-rechazado{background:var(--red-bg);color:var(--red-text)}
.b-toner{background:var(--purple-bg);color:var(--purple-text)}
.b-unidad{background:var(--teal-bg);color:var(--teal-text)}
.b-kit{background:var(--amber-bg);color:var(--amber-text)}
.b-falla{background:var(--red-bg);color:var(--red-text)}
.dot-status{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── MODAL ───────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;
  align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(2px);
}
.modal{
  background:var(--surface);border-radius:var(--rxl);border:1px solid var(--border);
  width:640px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.25);
}
.modal-hdr{
  padding:18px 22px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;
  background:var(--surface);z-index:1;
}
.modal-hdr h3{font-size:16px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{
  padding:14px 22px;border-top:1px solid var(--border);display:flex;
  justify-content:flex-end;gap:8px;background:var(--surface);position:sticky;bottom:0;
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{
  height:38px;border:1px solid var(--border2);border-radius:var(--r);padding:0 12px;
  font-size:13px;background:var(--surface);color:var(--text);outline:none;width:100%;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,86,219,.1)}
.fg textarea{height:72px;padding:10px 12px;resize:vertical}
.fg input:read-only,.fg select:disabled{background:var(--surface2);color:var(--text2);cursor:not-allowed}

/* ── PROVEEDOR VIEW ──────────────────────────────── */
.prov-header{
  background:var(--amber-bg);border:1px solid rgba(180,83,9,.15);border-radius:var(--rl);
  padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;
}
.prov-header svg{width:22px;height:22px;flex-shrink:0;fill:none;stroke:var(--amber-text);stroke-width:2;stroke-linecap:round}
.prov-header p{font-size:13px;color:var(--amber-text)}
.prov-header strong{font-weight:700}

/* ── DASHBOARD CHARTS ────────────────────────────── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;box-shadow:var(--shadow)}
.chart-card h4{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-lbl{width:145px;font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:18px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-cnt{font-size:12px;font-weight:700;min-width:20px}

/* ── TIENDAS TABLE ───────────────────────────────── */
.prog{height:6px;border-radius:3px;background:var(--surface2);width:64px;overflow:hidden;display:inline-block;vertical-align:middle}
.prog-fill{height:100%;background:var(--green);border-radius:3px}

/* ── EMPTY ───────────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty svg{width:40px;height:40px;stroke:var(--text3);fill:none;stroke-width:1.5;margin:0 auto 10px;display:block}
.empty p{font-size:13px}

/* ── LOADING ─────────────────────────────────────── */
.spinner{
  width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;align-items:center;justify-content:center;padding:48px;gap:12px;color:var(--text2);font-size:13px}

/* ── TOAST ───────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--bg);
  padding:11px 18px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:400;
  opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;max-width:320px;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--red);color:#fff}

/* ── GUIA SECTION ────────────────────────────────── */
.guia-box{background:var(--surface2);border-radius:var(--r);padding:10px 12px;margin-top:8px;font-size:12px;color:var(--text2);border:1px solid var(--border)}
.guia-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.guia-val{font-size:14px;font-weight:700;color:var(--text);font-family:monospace;letter-spacing:.05em}

/* ── RESPONSIVE ──────────────────────────────────── */
@media(max-width:768px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .chart-grid{grid-template-columns:1fr}
  .sidebar{display:none}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="dot-mark">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg>
      </div>

    </button>
    <div class="login-hint">Canal retail AT&amp;T México · Sistema interno</div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════ -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo"><span class="dot"></span> PrimeMX · Consumibles</div>
      <span class="role-badge" id="role-badge"></span>
    </div>
    <div class="topbar-right">
      <span id="user-name" style="font-size:13px;color:var(--text2)"></span>

  <div class="layout">
    <!-- Sidebar admin -->
    <div class="sidebar" id="sidebar">
      <div class="nav-label">Módulos</div>

        <svg viewBox="0 0 24 24"><path d="M15 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9l-4-4z"/><polyline points="15 3 15 9 21 9"/></svg>
        Tickets
      </button>
      <button class="nav-btn" id="nav-dashboard" onclick="navigate('dashboard')">

        Dashboard
      </button>
      <button class="nav-btn" id="nav-tiendas" onclick="navigate('tiendas')">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Tiendas
      </button>

      <div class="nav-label">Herramientas</div>

        Exportar CSV
      </button>
    </div>

    <!-- Main -->
    <div class="main" id="main-content">
      <div class="loading-center"><div class="spinner"></div> Cargando datos...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const FIREBASE_CONFIG = {

/* ═══════════════════════════════════════════════════
   CREDENCIALES  (cambia las contraseñas)

const USERS = {

  proveedor: { pass: "Prov2024!",  role: "proveedor", display: "Proveedor"     }

/* ─── Init Firebase ─── */
let db;
try {

  db = firebase.firestore();
} catch(e) {

/* ─── State ─── */
let currentUser = null;
let tickets     = [];
let unsubscribe = null;
let page        = "tickets";
let filt        = { mes:"", tipo:"", estatus:"", busq:"" };
let dashMes     = "";
let editId      = null;

const TIPOS   = ["TONER","UNIDAD DE IMAGEN","KIT MANTENIMIENTO","FALLA IMPRESORA"];
const ESTATUS = ["ABIERTO","ENVIADO","ENTREGADO","CERRADO","RECHAZADO"];
const COLORES  = { TONER:"#6d28d9","UNIDAD DE IMAGEN":"#0f766e","KIT MANTENIMIENTO":"#b45309","FALLA IMPRESORA":"#b91c1c" };

/* ══════════════ AUTH ════════════════════════════ */
function doLogin() {
  const user = document.getElementById("inp-user").value.trim().toLowerCase();
  const pass = document.getElementById("inp-pass").value;
  const err  = document.getElementById("login-error");
  const btn  = document.getElementById("btn-login");
  err.style.display = "none";
  if (!USERS[user] || USERS[user].pass !== pass) {
    err.textContent = "Usuario o contraseña incorrectos.";
    err.style.display = "block";
    return;
  }
  btn.disabled = true;
  currentUser = { id: user, ...USERS[user] };
  sessionStorage.setItem("pmx_user", JSON.stringify(currentUser));
  startApp();
}
document.getElementById("inp-pass").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
document.getElementById("inp-user").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("inp-pass").focus(); });

function doLogout() {
  if(unsubscribe) unsubscribe();
  currentUser = null;
  tickets = [];
  sessionStorage.removeItem("pmx_user");
  document.getElementById("app-screen").classList.remove("visible");
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("btn-login").disabled = false;
  document.getElementById("inp-pass").value = "";
}

function startApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").classList.add("visible");
  document.getElementById("role-badge").textContent = currentUser.display;
  document.getElementById("role-badge").className = "role-badge role-" + currentUser.role;
  document.getElementById("user-name").textContent = currentUser.display;
  if(currentUser.role === "proveedor") {
    document.getElementById("sidebar").style.display = "none";
  }
  loadTickets();
}

// Auto-restore session
const saved = sessionStorage.getItem("pmx_user");
if(saved) { currentUser = JSON.parse(saved); startApp(); }

/* ══════════════ DATA LAYER ══════════════════════ */
function loadTickets() {
  if(!db) {
    // Demo mode con datos de ejemplo
    tickets = DEMO_DATA.map(t=>({...t}));
    render();
    return;
  }
  const col = db.collection("tickets").orderBy("solicitud","desc");
  unsubscribe = col.onSnapshot(snap => {
    tickets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => {
    toast("Error al conectar con Firebase. Revisa la configuración.", true);
    tickets = DEMO_DATA.map(t=>({...t}));
    render();
  });
}

async function saveTicket(data) {
  if(!db) {
    // Demo local
    const idx = tickets.findIndex(t=>t.id===data.id);
    if(idx>=0) tickets[idx]={...data}; else tickets.unshift({...data});
    render(); return true;
  }
  try {
    const { id, ...rest } = data;
    if(editId) {
      await db.collection("tickets").doc(editId).set(rest);
    } else {
      await db.collection("tickets").add(rest);
    }
    return true;
  } catch(e) { toast("Error al guardar: "+e.message, true); return false; }
}

async function updateTicketPartial(id, patch) {
  if(!db) {
    const idx = tickets.findIndex(t=>t.id===id);
    if(idx>=0) tickets[idx]={...tickets[idx],...patch};
    render(); return true;
  }
  try {
    await db.collection("tickets").doc(id).update(patch);
    return true;
  } catch(e) { toast("Error: "+e.message, true); return false; }
}

async function deleteTicket(id) {
  if(!db) { tickets=tickets.filter(t=>t.id!==id); render(); return; }
  try { await db.collection("tickets").doc(id).delete(); }
  catch(e) { toast("Error al eliminar: "+e.message, true); }
}

/* ══════════════ ROUTING ═════════════════════════ */
function navigate(p) {
  page = p;
  ["tickets","dashboard","tiendas"].forEach(x => {
    document.getElementById("nav-"+x)?.classList.toggle("active", x===p);
  });
  render();
}

/* ══════════════ RENDER DISPATCH ═════════════════ */
function render() {
  const c = document.getElementById("main-content");
  if(currentUser.role==="proveedor") { c.innerHTML = renderProveedor(); }
  else if(page==="tickets")   { c.innerHTML = renderTickets(); }
  else if(page==="dashboard") { c.innerHTML = renderDashboard(); }
  else                        { c.innerHTML = renderTiendas(); }
  bindEvents();
}

/* ══════════════ HELPERS ═════════════════════════ */
function getFiltered() {
  return tickets.filter(t=>{
    if(filt.mes    && t.mes    !== filt.mes)    return false;
    if(filt.tipo   && t.tipo   !== filt.tipo)   return false;
    if(filt.estatus&& t.estatus!== filt.estatus)return false;
    if(filt.busq){
      const q=filt.busq.toLowerCase();
      if(!t.tienda?.toLowerCase().includes(q)&&!t.id?.toLowerCase().includes(q)&&!String(t.ceco||"").includes(q)) return false;
    }
    return true;
  });
}
function meses(){ return [...new Set(tickets.map(t=>t.mes).filter(Boolean))]; }
function tipoClass(t){ return {TONER:"toner","UNIDAD DE IMAGEN":"unidad","KIT MANTENIMIENTO":"kit","FALLA IMPRESORA":"falla"}[t]||"toner"; }
function estatusClass(e){ return {ABIERTO:"abierto",ENVIADO:"enviado",ENTREGADO:"entregado",CERRADO:"cerrado",RECHAZADO:"rechazado"}[e]||"cerrado"; }
function dias(t){ if(!t.solicitud||!t.entregado)return"—"; return Math.round((new Date(t.entregado)-new Date(t.solicitud))/86400000)+" d"; }
function svgIcon(name){
  const icons={
    plus:`<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    edit:`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
    trash:`<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
    inbox:`<svg viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`,
    send:`<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
    truck:`<svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
    check:`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
    warn:`<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  };
  return icons[name]||"";
}

async function provUpdate(id, newEstatus) {
  const guia = document.getElementById("guia-"+id)?.value.trim() || "";
  const obs  = document.getElementById("obs-"+id)?.value.trim() || "";
  const patch = { estatus: newEstatus, observaciones: obs };
  if(guia) patch.guia = guia;
  if(newEstatus==="ENTREGADO") patch.entregado = new Date().toISOString().split("T")[0];
  const ok = await updateTicketPartial(id, patch);
  if(ok) toast("Estatus actualizado a " + newEstatus);
}

async function provSaveObs(id) {
  const guia = document.getElementById("guia-"+id)?.value.trim() || "";
  const obs  = document.getElementById("obs-"+id)?.value.trim() || "";
  const patch = { observaciones: obs };
  if(guia) patch.guia = guia;
  const ok = await updateTicketPartial(id, patch);
  if(ok) toast("Observaciones guardadas");
}

function closeModal() { document.getElementById("modal-overlay")?.remove(); }

async function doSave() {
  const id_     = document.getElementById("m-id")?.value.trim();
  const tienda  = document.getElementById("m-tienda")?.value.trim();
  if(!id_||!tienda){ toast("Ticket y tienda son obligatorios", true); return; }
  if(!editId && tickets.find(t=>t.id===id_)){ toast("Ya existe ese número de ticket", true); return; }
  const data = {
    id: id_, tienda,
    ceco:   document.getElementById("m-ceco")?.value.trim()||"",
    sku:    document.getElementById("m-sku")?.value.trim()||"",
    tipo:   document.getElementById("m-tipo")?.value||"TONER",
    solicitud: document.getElementById("m-sol")?.value||"",
    entregado: document.getElementById("m-ent")?.value||"",
    mes:    document.getElementById("m-mes")?.value.trim()||"",
    estatus:document.getElementById("m-est")?.value||"ABIERTO",
    falla:  document.getElementById("m-falla")?.value.trim()||"",
    observaciones: document.getElementById("m-obs")?.value.trim()||"",
    guia:   document.getElementById("m-guia")?.value.trim()||"",
  };
  const ok = await saveTicket(data);
  if(ok){ toast(editId?"Ticket actualizado":"Ticket creado"); closeModal(); }
}

function confirmDel(id) {
  if(!confirm("¿Eliminar ticket "+id+"? Esta acción no se puede deshacer.")) return;
  deleteTicket(id).then(()=>toast("Ticket eliminado"));
}

/* ══════════════ ADMIN — DASHBOARD ══════════════ */
function renderDashboard() {
  const base = dashMes ? tickets.filter(t=>t.mes===dashMes) : tickets;
  const porTipo = {}; TIPOS.forEach(t=>porTipo[t]=0);
  base.forEach(t=>{ if(porTipo[t.tipo]!==undefined) porTipo[t.tipo]++; });
  const maxT = Math.max(...Object.values(porTipo),1);
  const porMes = {}; tickets.forEach(t=>{ porMes[t.mes]=(porMes[t.mes]||0)+1; });
  const maxM = Math.max(...Object.values(porMes),1);
  const porTienda = {}; base.forEach(t=>{ porTienda[t.tienda]=(porTienda[t.tienda]||0)+1; });
  const top = Object.entries(porTienda).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxTi = top[0]?top[0][1]:1;
  const cerr = base.filter(t=>["CERRADO","ENTREGADO"].includes(t.estatus)).length;
  const activos = base.filter(t=>["ABIERTO","ENVIADO"].includes(t.estatus)).length;
  const tiempos = base.filter(t=>t.entregado&&t.solicitud).map(t=>(new Date(t.entregado)-new Date(t.solicitud))/86400000);
  const prom = tiempos.length ? Math.round(tiempos.reduce((a,b)=>a+b,0)/tiempos.length) : 0;
  const MES_COLORS=["#1a56db","#0f766e","#b45309","#6d28d9","#b91c1c","#166534","#0369a1","#7c3aed"];
  return `
<div class="page-hdr">
  <div class="page-hdr-left"><h2>Dashboard</h2><p>Análisis de consumibles por período</p></div>
  <select id="d-mes" style="height:32px"><option value="">Todos los meses</option>${meses().map(m=>`<option value="${m}"${dashMes===m?" selected":""}>${m}</option>`).join("")}</select>
</div>
<div class="metrics">
  <div class="mc"><div class="mc-label">Solicitudes</div><div class="mc-value">${base.length}</div><div class="mc-sub">${dashMes||"período completo"}</div></div>
  <div class="mc"><div class="mc-label" style="color:var(--blue-text)">Activos</div><div class="mc-value" style="color:var(--blue)">${activos}</div><div class="mc-sub">abiertos o enviados</div></div>
  <div class="mc"><div class="mc-label" style="color:var(--green-text)">Resueltos</div><div class="mc-value" style="color:var(--green)">${cerr}</div><div class="mc-sub">${base.length?Math.round(cerr/base.length*100):0}% del total</div></div>
  <div class="mc"><div class="mc-label">Promedio entrega</div><div class="mc-value">${prom} d</div><div class="mc-sub">días hasta entrega</div></div>
</div>
<div class="chart-grid">
  <div class="chart-card">
    <h4>Por tipo de consumible</h4>
    ${TIPOS.map(tipo=>`<div class="bar-row">
      <div class="bar-lbl">${tipo}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(porTipo[tipo]/maxT*100)}%;background:${COLORES[tipo]}"></div></div>
      <div class="bar-cnt">${porTipo[tipo]}</div>
    </div>`).join("")}
  </div>
  <div class="chart-card">
    <h4>Solicitudes por mes</h4>
    ${Object.entries(porMes).map(([mes,cnt],i)=>`<div class="bar-row">
      <div class="bar-lbl">${mes}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxM*100)}%;background:${MES_COLORS[i%MES_COLORS.length]}"></div></div>
      <div class="bar-cnt">${cnt}</div>
    </div>`).join("")}
  </div>
</div>
<div class="chart-card">
  <h4>Top tiendas con más solicitudes${dashMes?" — "+dashMes:""}</h4>
  ${top.length===0?`<div class="empty" style="padding:20px">${svgIcon("inbox")}<p>Sin datos</p></div>`:top.map(([tienda,cnt])=>`
  <div class="bar-row">
    <div class="bar-lbl" title="${tienda}">${tienda.replace("PRM TDA ","").replace("PRM ","")}</div>
    <div class="bar-track" style="flex:2"><div class="bar-fill" style="width:${Math.round(cnt/maxTi*100)}%;background:#1a56db"></div></div>
    <div class="bar-cnt">${cnt}</div>
  </div>`).join("")}
</div>`;
}

/* ══════════════ ADMIN — TIENDAS ═════════════════ */
function renderTiendas() {
  const map = {};
  tickets.forEach(t=>{
    if(!map[t.tienda]) map[t.tienda]={tienda:t.tienda,ceco:t.ceco,total:0,toner:0,unidad:0,kit:0,falla:0,resueltos:0};
    map[t.tienda].total++;
    if(t.tipo==="TONER")            map[t.tienda].toner++;
    if(t.tipo==="UNIDAD DE IMAGEN") map[t.tienda].unidad++;
    if(t.tipo==="KIT MANTENIMIENTO")map[t.tienda].kit++;
    if(t.tipo==="FALLA IMPRESORA")  map[t.tienda].falla++;
    if(["CERRADO","ENTREGADO"].includes(t.estatus)) map[t.tienda].resueltos++;
  });
  const rows = Object.values(map).sort((a,b)=>b.total-a.total);
  return `
<div class="page-hdr">
  <div class="page-hdr-left"><h2>Ranking por tienda</h2><p>Volumen de solicitudes por punto de venta</p></div>
  <span style="font-size:13px;color:var(--text2)">${rows.length} tiendas</span>
</div>
<div class="card"><div class="tbl-wrap"><table>
  <thead><tr><th>#</th><th>Tienda</th><th>CECO</th><th>Total</th><th>Tóner</th><th>Unidad</th><th>Kit Mto.</th><th>Falla</th><th>% Resuelto</th></tr></thead>
  <tbody>
  ${rows.length===0?`<tr><td colspan="9"><div class="empty">${svgIcon("inbox")}<p>Sin datos</p></div></td></tr>`:""}
  ${rows.map((r,i)=>`<tr>
    <td style="font-size:11px;color:var(--text3);font-weight:700">${i+1}</td>
    <td><div style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px" title="${r.tienda}">${r.tienda}</div><div style="font-size:11px;color:var(--text3)">CECO ${r.ceco}</div></td>
    <td style="font-size:12px;color:var(--text2)">${r.ceco}</td>
    <td><strong>${r.total}</strong></td>
    <td>${r.toner||"—"}</td><td>${r.unidad||"—"}</td><td>${r.kit||"—"}</td><td>${r.falla||"—"}</td>
    <td>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="prog"><div class="prog-fill" style="width:${Math.round(r.resueltos/r.total*100)}%"></div></div>
        <span style="font-size:12px;font-weight:700">${Math.round(r.resueltos/r.total*100)}%</span>
      </div>
    </td>
  </tr>`).join("")}
  </tbody>
</table></div></div>`;
}

/* ══════════════ BIND EVENTS ════════════════════ */
function bindEvents() {
  const on = (id,ev,fn) => document.getElementById(id)?.addEventListener(ev,fn);
  on("f-busq","input",  e=>{ filt.busq=e.target.value; render(); });
  on("f-mes", "change", e=>{ filt.mes=e.target.value;  render(); });
  on("f-tipo","change", e=>{ filt.tipo=e.target.value; render(); });
  on("f-est", "change", e=>{ filt.estatus=e.target.value; render(); });
  on("d-mes", "change", e=>{ dashMes=e.target.value;   render(); });
  on("btn-nuevo","click",()=> openModal(null));
}

/* ══════════════ EXPORT CSV ══════════════════════ */
function exportCSV() {
  const cols=["id","tienda","ceco","sku","tipo","solicitud","entregado","estatus","guia","falla","observaciones","mes"];
  const hdr=cols.join(",");
  const rows=getFiltered().map(t=>cols.map(c=>`"${(t[c]||"").toString().replace(/"/g,'""')}"`).join(","));
  const csv=[hdr,...rows].join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);
  a.download="primemx-consumibles.csv";
  a.click();
  toast(`${rows.length} registros exportados`);
}

/* ══════════════ TOAST ═══════════════════════════ */
function toast(msg, isError=false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (isError?" error":"");
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),3000);
}
