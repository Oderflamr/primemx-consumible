<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>PrimeMX · Directorio de Tiendas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6F5;
  --panel:#FFFFFF;
  --ink:#122031;
  --ink-soft:#4B5A6B;
  --line:#DCE3E2;
  --signal:#0C8599;
  --signal-dark:#0A6B79;
  --signal-soft:#E3F1F2;
  --ok:#1E8E5A;
  --ok-soft:#E6F5EC;
  --warn:#C6421B;
  --warn-soft:#FBE9E4;
  --radius:10px;
  --font-ui:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-ui);
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

/* ===== LOGIN ===== */
#login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at 15% 20%, rgba(12,133,153,0.10), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(12,133,153,0.08), transparent 45%),
    var(--bg);
}
.login-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:40px 36px;
  width:100%;
  max-width:380px;
  box-shadow:0 12px 40px rgba(18,32,49,0.08);
}
.login-signal{
  display:flex;
  gap:4px;
  align-items:flex-end;
  height:22px;
  margin-bottom:18px;
}
.login-signal span{
  width:6px;
  background:var(--signal);
  border-radius:2px;
  animation:pulseBar 1.6s ease-in-out infinite;
}
.login-signal span:nth-child(1){height:30%;animation-delay:0s;}
.login-signal span:nth-child(2){height:55%;animation-delay:.15s;}
.login-signal span:nth-child(3){height:80%;animation-delay:.3s;}
.login-signal span:nth-child(4){height:100%;animation-delay:.45s;}
@keyframes pulseBar{0%,100%{opacity:.4;}50%{opacity:1;}}
.login-card h1{
  font-size:20px;
  margin:0 0 2px;
  letter-spacing:-0.01em;
}
.login-card .sub{
  color:var(--ink-soft);
  font-size:13px;
  margin:0 0 26px;
}
.field{margin-bottom:14px;}
.field label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.field input, .field select{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--line);
  border-radius:8px;
  font-size:14px;
  background:#FAFBFB;
  color:var(--ink);
}
.field input:focus, .field select:focus{
  outline:2px solid var(--signal);
  outline-offset:1px;
  border-color:var(--signal);
}
.btn{
  border:none;
  border-radius:8px;
  padding:11px 18px;
  font-size:14px;
  font-weight:600;
  transition:transform .05s ease, opacity .15s ease;
}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--signal);color:#fff;width:100%;}
.btn-primary:hover{background:var(--signal-dark);}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
.btn-ghost:hover{background:#F0F2F1;}
.btn-danger{background:var(--warn);color:#fff;}
.btn-danger:hover{opacity:.9;}
.login-error{
  background:var(--warn-soft);
  color:var(--warn);
  font-size:13px;
  padding:9px 12px;
  border-radius:8px;
  margin-bottom:14px;
  display:none;
}
.login-error.show{display:block;}
.login-hint{
  margin-top:18px;
  font-size:11.5px;
  color:#8B9AA5;
  line-height:1.5;
}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}
header.topbar{
  background:var(--panel);
  border-bottom:1px solid var(--line);
  padding:14px 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position:sticky;
  top:0;
  z-index:20;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{
  width:30px;height:30px;border-radius:8px;
  background:var(--signal);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:var(--font-mono);font-weight:600;font-size:13px;
}
.brand h1{font-size:15px;margin:0;font-weight:700;}
.brand .brand-sub{font-size:11px;color:var(--ink-soft);margin:0;}
.user-chip{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--ink-soft);
}
.role-tag{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
  padding:3px 8px;
  border-radius:20px;
  background:var(--signal-soft);
  color:var(--signal-dark);
}
.role-tag.admin{background:#FDEBD8;color:#A6560F;}

main{flex:1;padding:20px;max-width:1400px;margin:0 auto;width:100%;}

.stats-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;
  margin-bottom:16px;
}
.stat-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:12px 14px;
}
.stat-card .num{font-family:var(--font-mono);font-size:22px;font-weight:600;}
.stat-card .lbl{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}

.toolbar{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:16px;
  align-items:center;
}
.search-box{
  flex:1 1 220px;
  position:relative;
}
.search-box input{
  width:100%;
  padding:10px 12px 10px 34px;
  border:1px solid var(--line);
  border-radius:8px;
  font-size:13.5px;
  background:#FAFBFB;
}
.search-box::before{
  content:'⌕';
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--ink-soft);font-size:16px;
}
.filter-select{
  padding:10px 10px;
  border:1px solid var(--line);
  border-radius:8px;
  font-size:13px;
  background:#FAFBFB;
  color:var(--ink);
  min-width:130px;
}
.toolbar .spacer{flex:1;}
.toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;}

.result-count{
  font-size:12.5px;
  color:var(--ink-soft);
  margin-bottom:10px;
}

/* Cards grid */
.store-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}
.store-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px;
  cursor:pointer;
  transition:border-color .12s ease, box-shadow .12s ease;
}
.store-card:hover{
  border-color:var(--signal);
  box-shadow:0 4px 14px rgba(18,32,49,0.07);
}
.store-card .row-top{
  display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;
}
.store-card .cc{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--signal-dark);
  background:var(--signal-soft);
  padding:2px 7px;
  border-radius:5px;
  font-weight:600;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;
}
.status-dot.on{background:var(--ok);}
.status-dot.off{background:var(--warn);}
.store-card .plaza{
  font-size:14px;font-weight:600;margin:0 0 4px;line-height:1.3;
}
.store-card .meta{
  font-size:12px;color:var(--ink-soft);
  display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;
}
.meta-tag{
  background:#EFF2F1;
  border-radius:5px;
  padding:2px 7px;
  font-size:11px;
}
.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
}
.empty-state .big{font-size:32px;margin-bottom:8px;}

.pagination{
  display:flex;justify-content:center;align-items:center;gap:10px;
  margin-top:20px;padding-bottom:30px;
  font-size:13px;color:var(--ink-soft);
}
.pagination button{
  background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:6px 12px;font-size:13px;
}
.pagination button:disabled{opacity:.4;cursor:not-allowed;}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(18,32,49,0.45);
  display:none;align-items:center;justify-content:center;
  padding:16px;z-index:100;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--panel);
  border-radius:14px;
  max-width:560px;width:100%;
  max-height:90vh;overflow-y:auto;
  padding:26px;
}
.modal h2{margin:0 0 4px;font-size:18px;}
.modal .modal-sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 20px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-grid .full{grid-column:1/-1;}
.modal-grid .field label{font-size:11px;}
.modal-actions{
  display:flex;justify-content:flex-end;gap:10px;margin-top:22px;
}
.detail-row{
  display:flex;justify-content:space-between;gap:14px;
  padding:9px 0;border-bottom:1px solid var(--line);
  font-size:13.5px;
}
.detail-row:last-child{border-bottom:none;}
.detail-row .k{color:var(--ink-soft);}
.detail-row .v{font-weight:500;text-align:right;}
.detail-row .v.mono{font-family:var(--font-mono);font-size:12.5px;}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;
  font-size:13px;opacity:0;transition:all .25s ease;z-index:200;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--warn);}
.toast.ok{background:var(--ok);}

@media (max-width:640px){
  header.topbar{padding:12px 14px;}
  .brand h1{font-size:13.5px;}
  main{padding:14px;}
  .modal-grid{grid-template-columns:1fr;}
  .toolbar-actions{width:100%;}
  .toolbar-actions .btn{flex:1;}
}
</style>
</head>

<!-- ===================== LOGIN ===================== -->
<div id="login-screen">

    <div class="login-signal"><span></span><span></span><span></span><span></span></div>
    <h1>Directorio de Tiendas</h1>
    <p class="sub">PrimeMX · Acceso al portal</p>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos.</div>
    <form id="login-form">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="login-user" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="login-pass" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Ingresar</button>
    </form>
    <p class="login-hint">Acceso restringido. Contacta al administrador si no tienes credenciales.</p>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">

    <div class="user-chip">

      <span class="role-tag" id="role-tag">consulta</span>

    </div>
  </header>

  <main>
    <div class="stats-row" id="stats-row"></div>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Buscar por tienda, plaza, dirección, host o clave...">
      </div>
      <select class="filter-select" id="filter-carrier"><option value="">Carrier: todos</option></select>
      <select class="filter-select" id="filter-clasif"><option value="">Clasificación: todas</option></select>
      <select class="filter-select" id="filter-origen"><option value="">Origen: todos</option></select>
      <select class="filter-select" id="filter-activo">

        <option value="0">Inactivo</option>
      </select>
      <div class="spacer"></div>
      <div class="toolbar-actions">
        <button class="btn btn-ghost" id="export-btn">Exportar CSV</button>
        <button class="btn btn-primary" id="new-store-btn" style="display:none;">+ Nueva tienda</button>
      </div>
    </div>

    <p class="result-count" id="result-count"></p>
    <div class="store-grid" id="store-grid"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

function toast(msg, type=""){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(()=> el.className = 'toast', 2500);
}
function esc(v){
  return (v===undefined||v===null) ? '' : String(v).replace(/</g,'&lt;');
}
function fieldLabelMap(){

    cc:'No. Tienda', hostname:'HostName', cve_pdv:'Clave PDV', pos_id:'POS ID',

/* ══════════════════ LOGIN ══════════════════ */
document.getElementById('login-form').addEventListener('submit', function(e){
  e.preventDefault();
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  const match = USERS[u];
  const errEl = document.getElementById('login-error');
  if(match && match.password === p){
    currentUser = { username:u, role:match.role, label:match.label };
    errEl.classList.remove('show');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('show');
    initApp();
  } else {
    errEl.classList.add('show');
  }
});
document.getElementById('logout-btn').addEventListener('click', function(){
  currentUser = null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pass').value='';
});

/* ══════════════════ INIT APP ══════════════════ */
async function initApp(){
  document.getElementById('user-label').textContent = currentUser.label;
  const roleTag = document.getElementById('role-tag');
  roleTag.textContent = currentUser.role === 'admin' ? 'Administrador' : 'Consulta';
  roleTag.className = 'role-tag' + (currentUser.role === 'admin' ? ' admin' : '');
  document.getElementById('new-store-btn').style.display = currentUser.role === 'admin' ? 'inline-block' : 'none';

  await ensureSeed();
  await loadStores();
}

async function ensureSeed(){
  try{
    const snap = await db.collection(COLLECTION).limit(1).get();
    if(snap.empty && SEED_DATA.length){
      toast('Cargando datos iniciales, un momento...');
      const batchSize = 400;
      for(let i=0;i<SEED_DATA.length;i+=batchSize){
        const batch = db.batch();
        SEED_DATA.slice(i,i+batchSize).forEach(item=>{
          const ref = db.collection(COLLECTION).doc();
          batch.set(ref, item);
        });
        await batch.commit();
      }
      toast('Datos iniciales cargados', 'ok');
    }
  }catch(err){
    console.error(err);
    toast('No se pudo conectar a la base de datos. Revisa tu firebaseConfig.', 'error');
  }
}

async function loadStores(){
  try{
    const snap = await db.collection(COLLECTION).get();
    allStores = snap.docs.map(d=>({id:d.id, ...d.data()}));
  }catch(err){
    console.error(err);
    toast('Error al cargar tiendas', 'error');
    allStores = [];
  }
  populateFilterOptions();
  applyFilters();
  renderStats();
}

function populateFilterOptions(){
  const fill = (selId, key)=>{
    const sel = document.getElementById(selId);
    const current = sel.value;
    const values = [...new Set(allStores.map(s=>s[key]).filter(Boolean))].sort();
    sel.innerHTML = sel.options[0].outerHTML + values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
    sel.value = current;
  };
  fill('filter-carrier','carrier');
  fill('filter-clasif','clasificacion');
  fill('filter-origen','origen');
}

function renderStats(){
  const total = allStores.length;
  const activas = allStores.filter(s=>String(s.activo)==='1').length;
  const inactivas = total - activas;
  const carriers = new Set(allStores.map(s=>s.carrier).filter(Boolean)).size;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Tiendas totales</div></div>
    <div class="stat-card"><div class="num" style="color:var(--ok)">${activas}</div><div class="lbl">Activas</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warn)">${inactivas}</div><div class="lbl">Inactivas</div></div>
    <div class="stat-card"><div class="num">${carriers}</div><div class="lbl">Carriers distintos</div></div>
  `;
  document.getElementById('store-count-sub').textContent = `${total} tiendas registradas`;
}

/* ══════════════════ FILTROS Y BÚSQUEDA ══════════════════ */
['search-input'].forEach(id=>{
  document.getElementById(id).addEventListener('input', ()=>{page=1; applyFilters();});
});
['filter-carrier','filter-clasif','filter-origen','filter-activo'].forEach(id=>{
  document.getElementById(id).addEventListener('change', ()=>{page=1; applyFilters();});
});

function applyFilters(){
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const fCarrier = document.getElementById('filter-carrier').value;
  const fClasif = document.getElementById('filter-clasif').value;
  const fOrigen = document.getElementById('filter-origen').value;
  const fActivo = document.getElementById('filter-activo').value;

  filtered = allStores.filter(s=>{
    if(fCarrier && s.carrier !== fCarrier) return false;
    if(fClasif && s.clasificacion !== fClasif) return false;
    if(fOrigen && s.origen !== fOrigen) return false;
    if(fActivo !== '' && String(s.activo) !== fActivo) return false;
    if(q){
      const hay = [s.cc,s.plaza,s.hostname,s.direccion,s.cve_pdv,s.cve_inventario,s.pos_id]
        .map(v=>String(v||'').toLowerCase()).join(' ');
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  renderGrid();
}

/* ══════════════════ RENDER GRID ══════════════════ */
function renderGrid(){
  const grid = document.getElementById('store-grid');
  const countEl = document.getElementById('result-count');
  countEl.textContent = `${filtered.length} resultado${filtered.length===1?'':'s'}`;

  if(filtered.length === 0){
    grid.innerHTML = '';
    document.getElementById('pagination').innerHTML = '';
    grid.insertAdjacentHTML('afterend', '');
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="big">🔍</div>No se encontraron tiendas con esos filtros.</div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if(page > totalPages) page = totalPages;
  const start = (page-1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start+PAGE_SIZE);

  grid.innerHTML = pageItems.map(s=>`
    <div class="store-card" data-id="${s.id}">
      <div class="row-top">
        <span class="cc">${esc(s.cc||'—')}</span>
        <span class="status-dot ${String(s.activo)==='1' ? 'on':'off'}" title="${String(s.activo)==='1'?'Activo':'Inactivo'}"></span>
      </div>
      <p class="plaza">${esc(s.plaza||'Sin nombre')}</p>
      <div class="meta">
        ${s.carrier ? `<span class="meta-tag">${esc(s.carrier)}</span>`:''}
        ${s.clasificacion ? `<span class="meta-tag">${esc(s.clasificacion)}</span>`:''}
        ${s.hostname ? `<span class="meta-tag">${esc(s.hostname)}</span>`:''}
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.store-card').forEach(card=>{
    card.addEventListener('click', ()=> openDetail(card.dataset.id));
  });

  const pag = document.getElementById('pagination');
  pag.innerHTML = `
    <button id="prev-page" ${page<=1?'disabled':''}>‹ Anterior</button>
    <span>Página ${page} de ${totalPages}</span>
    <button id="next-page" ${page>=totalPages?'disabled':''}>Siguiente ›</button>
  `;
  document.getElementById('prev-page')?.addEventListener('click', ()=>{page--; renderGrid();});
  document.getElementById('next-page')?.addEventListener('click', ()=>{page++; renderGrid();});
}

/* ══════════════════ MODAL: VER DETALLE ══════════════════ */
function openDetail(id){
  const s = allStores.find(x=>x.id===id);
  if(!s) return;
  const labels = fieldLabelMap();
  const order = ['plaza','cc','hostname','cve_pdv','pos_id','carrier','primario','secundario','tercero',
                 'tecnologia','clasificacion','vigencia_servicio','cve_inventario','origen','activo','direccion'];

  const rowsHtml = order.map(key=>{
    let val = s[key];
    if(key==='activo') val = String(val)==='1' ? 'Activo' : 'Inactivo';
    const mono = ['cc','hostname','cve_pdv','pos_id','cve_inventario'].includes(key);
    return `<div class="detail-row"><span class="k">${labels[key]}</span><span class="v ${mono?'mono':''}">${esc(val)||'—'}</span></div>`;
  }).join('');

  const adminActions = currentUser.role === 'admin' ? `
    <div class="modal-actions">
      <button class="btn btn-danger" id="delete-store-btn">Eliminar</button>
      <button class="btn btn-ghost" id="close-modal-btn">Cerrar</button>
      <button class="btn btn-primary" id="edit-store-btn">Editar</button>
    </div>` : `
    <div class="modal-actions">
      <button class="btn btn-ghost" id="close-modal-btn">Cerrar</button>
    </div>`;

  document.getElementById('modal-content').innerHTML = `
    <h2>${esc(s.plaza||'Detalle de tienda')}</h2>
    <p class="modal-sub">No. de tienda ${esc(s.cc||'—')}</p>
    <div>${rowsHtml}</div>
    ${adminActions}
  `;
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('close-modal-btn').addEventListener('click', closeModal);
  document.getElementById('edit-store-btn')?.addEventListener('click', ()=> openForm(id));
  document.getElementById('delete-store-btn')?.addEventListener('click', ()=> confirmDelete(id));
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
}
document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

/* ══════════════════ MODAL: ALTA / EDICIÓN (solo admin) ══════════════════ */
document.getElementById('new-store-btn').addEventListener('click', ()=> openForm(null));

function openForm(id){
  editingId = id;
  const s = id ? allStores.find(x=>x.id===id) : {};
  const labels = fieldLabelMap();
  const textFields = ['cc','hostname','cve_pdv','pos_id','plaza','carrier','primario','secundario',
                       'tercero','tecnologia','clasificacion','vigencia_servicio','cve_inventario'];

  const inputsHtml = textFields.map(key=>`
    <div class="field">
      <label>${labels[key]}</label>
      <input type="text" id="f-${key}" value="${esc(s[key])}">
    </div>
  `).join('');

  document.getElementById('modal-content').innerHTML = `
    <h2>${id ? 'Editar tienda' : 'Nueva tienda'}</h2>
    <p class="modal-sub">${id ? 'Modifica los campos y guarda los cambios.' : 'Completa los datos de la nueva tienda.'}</p>
    <div class="modal-grid">
      ${inputsHtml}
      <div class="field">
        <label>Origen</label>
        <select id="f-origen">
          <option value="ATT" ${s.origen==='ATT'?'selected':''}>ATT</option>
          <option value="PRIME" ${s.origen==='PRIME'?'selected':''}>PRIME</option>
          <option value="MAS MOVIL" ${s.origen==='MAS MOVIL'?'selected':''}>MAS MOVIL</option>
        </select>
      </div>
      <div class="field">
        <label>Estatus</label>
        <select id="f-activo">
          <option value="1" ${String(s.activo)==='1'||s.activo===undefined?'selected':''}>Activo</option>
          <option value="0" ${String(s.activo)==='0'?'selected':''}>Inactivo</option>
        </select>
      </div>
      <div class="field full">
        <label>Dirección</label>
        <input type="text" id="f-direccion" value="${esc(s.direccion)}">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancel-form-btn">Cancelar</button>
      <button class="btn btn-primary" id="save-form-btn">${id ? 'Guardar cambios' : 'Crear tienda'}</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('cancel-form-btn').addEventListener('click', closeModal);
  document.getElementById('save-form-btn').addEventListener('click', saveForm);
}

async function saveForm(){
  const textFields = ['cc','hostname','cve_pdv','pos_id','plaza','carrier','primario','secundario',
                       'tercero','tecnologia','clasificacion','vigencia_servicio','cve_inventario','direccion'];
  const data = {};
  textFields.forEach(key=> data[key] = document.getElementById(`f-${key}`).value.trim());
  data.origen = document.getElementById('f-origen').value;
  data.activo = document.getElementById('f-activo').value;

  if(!data.plaza){
    toast('El nombre de la plaza es obligatorio', 'error');
    return;
  }

  try{
    if(editingId){
      await db.collection(COLLECTION).doc(editingId).update(data);
      toast('Tienda actualizada', 'ok');
    } else {
      await db.collection(COLLECTION).add(data);
      toast('Tienda creada', 'ok');
    }
    closeModal();
    await loadStores();
  }catch(err){
    console.error(err);
    toast('Error al guardar', 'error');
  }
}

function confirmDelete(id){
  const s = allStores.find(x=>x.id===id);
  document.getElementById('modal-content').innerHTML = `
    <h2>Eliminar tienda</h2>
    <p class="modal-sub">Esta acción no se puede deshacer.</p>
    <p>¿Confirmas eliminar <strong>${esc(s?.plaza||'')}</strong> (No. ${esc(s?.cc||'—')}) del directorio?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancel-delete-btn">Cancelar</button>
      <button class="btn btn-danger" id="confirm-delete-btn">Eliminar</button>
    </div>
  `;
  document.getElementById('cancel-delete-btn').addEventListener('click', closeModal);
  document.getElementById('confirm-delete-btn').addEventListener('click', async ()=>{
    try{
      await db.collection(COLLECTION).doc(id).delete();
      toast('Tienda eliminada', 'ok');
      closeModal();
      await loadStores();
    }catch(err){
      console.error(err);
      toast('Error al eliminar', 'error');
    }
  });
}

/* ══════════════════ EXPORTAR CSV ══════════════════ */
document.getElementById('export-btn').addEventListener('click', ()=>{
  if(filtered.length===0){ toast('No hay datos para exportar','error'); return; }
  const labels = fieldLabelMap();
  const keys = Object.keys(labels);
  const header = keys.map(k=>labels[k]).join(',');
  const rows = filtered.map(s=> keys.map(k=>{
    let v = k==='activo' ? (String(s.activo)==='1'?'Activo':'Inactivo') : (s[k]||'');
    v = String(v).replace(/"/g,'""');
    return `"${v}"`;
  }).join(','));
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `directorio_tiendas_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
