<style>
/* ===== Portal: variables, login, shell y header (igual que directorio.html) ===== */
<style>
:root{
  --bg:#F4F6F5;
  --panel:#FFFFFF;
  --ink:#122031;
  --ink-soft:#4B5A6B;
  --line:#DCE3E2;
  --signal:#0C8599;
  --signal-dark:#0A6B79;
  --signal-soft:#E3F1F2;
  --ok:#1E8E5A;
  --ok-soft:#E6F5EC;
  --warn:#C6421B;
  --warn-soft:#FBE9E4;
  --radius:10px;
  --font-ui:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-ui);
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

/* ===== LOGIN ===== */
#login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at 15% 20%, rgba(12,133,153,0.10), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(12,133,153,0.08), transparent 45%),
    var(--bg);
}
.login-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:40px 36px;
  width:100%;
  max-width:380px;
  box-shadow:0 12px 40px rgba(18,32,49,0.08);
}
.login-signal{
  display:flex;
  gap:4px;
  align-items:flex-end;
  height:22px;
  margin-bottom:18px;
}
.login-signal span{
  width:6px;
  background:var(--signal);
  border-radius:2px;
  animation:pulseBar 1.6s ease-in-out infinite;
}
.login-signal span:nth-child(1){height:30%;animation-delay:0s;}
.login-signal span:nth-child(2){height:55%;animation-delay:.15s;}
.login-signal span:nth-child(3){height:80%;animation-delay:.3s;}
.login-signal span:nth-child(4){height:100%;animation-delay:.45s;}
@keyframes pulseBar{0%,100%{opacity:.4;}50%{opacity:1;}}
.login-card h1{
  font-size:20px;
  margin:0 0 2px;
  letter-spacing:-0.01em;
}
.login-card .sub{
  color:var(--ink-soft);
  font-size:13px;
  margin:0 0 26px;
}
.field{margin-bottom:14px;}
.field label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.field input, .field select{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--line);
  border-radius:8px;
  font-size:14px;
  background:#FAFBFB;
  color:var(--ink);
}
.field input:focus, .field select:focus{
  outline:2px solid var(--signal);
  outline-offset:1px;
  border-color:var(--signal);
}
.btn{
  border:none;
  border-radius:8px;
  padding:11px 18px;
  font-size:14px;
  font-weight:600;
  transition:transform .05s ease, opacity .15s ease;
}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--signal);color:#fff;width:100%;}
.btn-primary:hover{background:var(--signal-dark);}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
.btn-ghost:hover{background:#F0F2F1;}
.btn-danger{background:var(--warn);color:#fff;}
.btn-danger:hover{opacity:.9;}
.login-error{
  background:var(--warn-soft);
  color:var(--warn);
  font-size:13px;
  padding:9px 12px;
  border-radius:8px;
  margin-bottom:14px;
  display:none;
}
.login-error.show{display:block;}
.login-hint{
  margin-top:18px;
  font-size:11.5px;
  color:#8B9AA5;
  line-height:1.5;
}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}
header.topbar{
  background:var(--panel);
  border-bottom:1px solid var(--line);
  padding:14px 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position:sticky;
  top:0;
  z-index:20;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{
  width:30px;height:30px;border-radius:8px;
  background:var(--signal);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:var(--font-mono);font-weight:600;font-size:13px;
}
.brand h1{font-size:15px;margin:0;font-weight:700;}
.brand .brand-sub{font-size:11px;color:var(--ink-soft);margin:0;}
.user-chip{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--ink-soft);
}
.role-tag{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
  padding:3px 8px;
  border-radius:20px;
  background:var(--signal-soft);
  color:var(--signal-dark);
}
.role-tag.admin{background:#FDEBD8;color:#A6560F;}

main{flex:1;padding:20px;max-width:1400px;margin:0 auto;width:100%;}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;
  font-size:13px;opacity:0;transition:all .25s ease;z-index:200;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--warn);}
.toast.ok{background:var(--ok);}

</style>

  .status-badge{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:10px;}
  .status-badge.critica{background:#FDECEC; color:var(--crit);}

<!-- Firebase (mismo proyecto que Directorio de Tiendas) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCIQGZGwNEw3vALL4clGVbCLLYCcUy3CYU",
  authDomain: "primemx-consumibles.firebaseapp.com",
  projectId: "primemx-consumibles",
  storageBucket: "primemx-consumibles.firebasestorage.app",
  messagingSenderId: "796822637748",
  appId: "1:796822637748:web:7e8db90898618d26079be1"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const ROLES_COLLECTION = "usuarios";
const AUTH_DOMAIN = "primecommsmx.com";
let currentUser = null;

function toast(msg, type=""){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(()=> el.className = 'toast', 2500);
}

/* LOGIN (mismo mecanismo que Directorio de Tiendas: usuario+contraseña de Firebase Auth) */
document.getElementById('login-form').addEventListener('submit', async function(e){
  e.preventDefault();
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const submitBtn = e.target.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  try{
    await auth.signInWithEmailAndPassword(u + '@' + AUTH_DOMAIN, p);
    errEl.classList.remove('show');
  }catch(err){
    console.error(err);
    errEl.textContent = 'No se pudo entrar (' + (err.code || err.message || 'error desconocido') + ').';
    errEl.classList.add('show');
  }
  submitBtn.disabled = false;
});

document.getElementById('logout-btn').addEventListener('click', function(){
  auth.signOut();
});

auth.onAuthStateChanged(async function(user){
  if(user){
    const username = (user.email || '').split('@')[0];
    let roleInfo = { role: 'consulta', label: username };
    try{
      const doc = await db.collection(ROLES_COLLECTION).doc(username).get();
      if(doc.exists){
        roleInfo = { role: doc.data().role || 'consulta', label: doc.data().label || username };
      }
    }catch(err){
      console.error('No se pudo leer el rol del usuario', err);
    }
    currentUser = { username, role: roleInfo.role, label: roleInfo.label };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('show');
    document.getElementById('user-label').textContent = currentUser.label;
    const roleTag = document.getElementById('role-tag');
    roleTag.textContent = currentUser.role === 'admin' ? 'Administrador' : 'Consulta';
    roleTag.className = 'role-tag' + (currentUser.role === 'admin' ? ' admin' : '');
    window.initCaidasApp(currentUser.role);
  } else {
    currentUser = null;
    document.getElementById('app').classList.remove('show');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-pass').value = '';
  }
});
</script>

  function parseFechaTicket(v){
    if(!v) return null;
    if(v instanceof Date) return isNaN(v.getTime()) ? null : v;
    const s = String(v).trim();
    const m = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}):(\d{2})/);
    if(!m) return null;
    const [,d,mo,y,h,mi] = m.map(Number);
    const dt = new Date(y, mo-1, d, h, mi);
    return isNaN(dt.getTime()) ? null : dt;

    const c = String(cliente).trim();
    const up = c.toUpperCase();
    let idx = up.lastIndexOf('PRM TDA');
    if(idx === -1) idx = up.lastIndexOf('PRM ');
    if(idx === -1) return c;
    const nombre = c.slice(idx).trim();
    return CORRECCIONES_NOMBRE[nombre.toUpperCase()] || nombre;
  }
  // Busca Carrier/Tecnología en el catálogo por nombre canónico exacto (mayúsculas), con un
  // segundo intento quitando/agregando "TDA" (el catálogo no siempre lo incluye).
  function buscarCatalogo(nombreCanonico){
    const up = String(nombreCanonico).toUpperCase();
    let info = CATALOGO_TIENDAS[up];
    if(!info){
      const alt = up.includes('PRM TDA ') ? up.replace('PRM TDA ', 'PRM ') : up.replace('PRM ', 'PRM TDA ');
      info = CATALOGO_TIENDAS[alt];
    }
    return info ? { carrier: info.carrier, tecnologia: info.tecnologia } : { carrier: '—', tecnologia: '—' };
  }

  function proveedorCaida(categoria){
    if(!categoria) return null;
    const c = String(categoria);
    if(!c.startsWith('Internet y telefonia')) return null;
    const esCaida = c.includes('Sin servicio') || c.includes('Problemas con velocidad');
    if(!esCaida) return null;
    if(c.includes('Totalplay')) return 'TotalPlay';
    if(c.includes('Telmex')) return 'Telmex';
    if(c.includes('Metro Carrier')) return 'Metrocarrier';
    return null;
  }
  function median(sortedArr){
    const n = sortedArr.length;
    if(n===0) return 0;
    const mid = Math.floor(n/2);
    return n%2 ? sortedArr[mid] : (sortedArr[mid-1]+sortedArr[mid])/2;
  }
  function statsFromDurations(durations){
    if(!durations.length) return {tickets:0,avg:0,dias:0,min:0,mediana:0,max:0,dist:[0,0,0,0,0],pct24:0,pct48:0};
    const sorted = [...durations].sort((a,b)=>a-b);
    const tickets = durations.length;
    const sum = durations.reduce((a,b)=>a+b,0);
    const dist = [0,0,0,0,0];
    let c24=0, c48=0;
    durations.forEach(h=>{
      if(h<4) dist[0]++; else if(h<12) dist[1]++; else if(h<24) dist[2]++; else if(h<72) dist[3]++; else dist[4]++;
      if(h<24) c24++;
      if(h<48) c48++;
    });
    return {
      tickets,
      avg: Math.round((sum/tickets)*10)/10,
      dias: Math.round((sum/tickets/24)*100)/100,
      min: Math.round(sorted[0]*10)/10,
      mediana: Math.round(median(sorted)*10)/10,
      max: Math.round(sorted[sorted.length-1]*10)/10,
      dist,
      pct24: Math.round(100*c24/tickets),
      pct48: Math.round(100*c48/tickets)
    };
  }

  // Calcula los datos a partir de las filas del Excel SIN tocar el estado (para poder confirmar antes de aplicar)
  function calcularDatosTickets(rows, fileName){
    const monthCounts = { TotalPlay:new Array(12).fill(0), Telmex:new Array(12).fill(0), Metrocarrier:new Array(12).fill(0) };
    const durations   = { TotalPlay:[], Telmex:[], Metrocarrier:[] };
    const storeMonth  = { TotalPlay:{}, Telmex:{} };
    let maxMonthIdx = -1, totalCaidas = 0;

    rows.forEach(row=>{
      const prov = proveedorCaida(row['Categoría']);
      if(!prov) return;
      const fc = parseFechaTicket(row['Fecha de creación']);
      if(!fc) return;
      const mIdx = fc.getMonth();
      monthCounts[prov][mIdx]++;
      totalCaidas++;
      if(mIdx > maxMonthIdx) maxMonthIdx = mIdx;

      if(prov==='TotalPlay' || prov==='Telmex'){
        const store = extraerNombreCanonico(row['Cliente']) || 'Sin nombre';
        if(!storeMonth[prov][store]) storeMonth[prov][store] = new Array(12).fill(0);
        storeMonth[prov][store][mIdx]++;
      }
      if(String(row['Estado']).trim()==='Cerrado'){
        const fcierre = parseFechaTicket(row['Fecha de cierre']);
        if(fcierre){
          const hrs = (fcierre - fc)/3600000;
          if(hrs >= 0) durations[prov].push(hrs);
        }
      }
    });

    if(maxMonthIdx < 0){
      throw new Error('No se encontraron tickets con categoría "Internet y telefonia" (Sin servicio / Problemas con velocidad) en el archivo.');
    }

    const hasta = maxMonthIdx;
    const provs = ['TotalPlay','Telmex','Metrocarrier'];
    const atencion = {};
    provs.forEach(p=>{ atencion[p] = statsFromDurations(durations[p]); });
    const tops = {};
    ['TotalPlay','Telmex'].forEach(p=>{
      tops[p] = Object.entries(storeMonth[p]).map(([nombre,meses])=>{
        const cat = buscarCatalogo(nombre);
        return { nombre, meses: meses.slice(0,hasta+1), carrier: cat.carrier, tecnologia: cat.tecnologia };
      });
    });

    return {
      fileName,
      periodo_actual: MESES[hasta],
      tendencia_data: { TotalPlay: monthCounts.TotalPlay, Telmex: monthCounts.Telmex, Metrocarrier: monthCounts.Metrocarrier },
      atencion,
      top_totalplay: tops.TotalPlay,
      top_telmex: tops.Telmex,
      resumen: {
        totalCaidas, mesesCubiertos: hasta+1,
        tiendasTP: Object.keys(storeMonth.TotalPlay).length,
        tiendasTM: Object.keys(storeMonth.Telmex).length,
        criticasTP: tops.TotalPlay.filter(r=>r.meses.reduce((a,b)=>a+b,0)>=5).length,
        criticasTM: tops.Telmex.filter(r=>r.meses.reduce((a,b)=>a+b,0)>=5).length
      }
    };
  }

  function aplicarDatosTickets(datos){
    state.tendencia.data.TotalPlay = datos.tendencia_data.TotalPlay;
    state.tendencia.data.Telmex = datos.tendencia_data.Telmex;
    state.tendencia.data.Metrocarrier = datos.tendencia_data.Metrocarrier;
    state.periodo_actual = datos.periodo_actual;
    state.atencion.TotalPlay = datos.atencion.TotalPlay;

  // ---------- Carga de archivo de expansión (Excel) ----------
  function normalizeMes(v){
    if(v === null || v === undefined || v === '') return '';
    if(v instanceof Date){
      return MESES[v.getMonth()] + ' ' + v.getFullYear();
    }
    return String(v).trim();
  }
  function fmtCellExp(v){
    if(v === null || v === undefined || v === '') return '-';
    if(v instanceof Date) return v.toISOString().slice(0,10);
    return String(v).trim();
  }
  function numOrDashExp(v){
    if(v === null || v === undefined || v === '') return '-';
    return v;
  }
  function computeEstatusExpansion(clave, region, mes, entregadoArq, entregaImpresora){
    const sinDatos = !clave && (!region || region==='-');
    if(sinDatos) return 'Prospecto';
    const mesStr = String(mes).toUpperCase();
    const arq = String(entregadoArq).toUpperCase();
    const imp = String(entregaImpresora).toUpperCase();
    if(mesStr.includes('PROCESO') || arq.includes('PENDIENTE') || imp.includes('PENDIENTE')) return 'En proceso';
    return 'Abierta';
  }
  function estatusExpClass(estatus){
    if(estatus==='Abierta') return 'estable';
    if(estatus==='En proceso') return 'alerta';
    if(estatus==='Cerrada') return 'critica';
    return 'atencion';
  }

  function calcularDatosExpansion(rows2d, fileName){
    let headerIdx = -1;
    for(let i=0;i<Math.min(10,rows2d.length);i++){
      if(String((rows2d[i]||[])[0]).trim()==='#Tienda'){ headerIdx = i; break; }
    }
    if(headerIdx < 0) throw new Error('No se encontró el encabezado "#Tienda" en la hoja. Verifica que sea el archivo de expansión correcto.');

    const tiendas = [];
    for(let i=headerIdx+1; i<rows2d.length; i++){
      const row = rows2d[i] || [];
      const isBlank = row.slice(0,19).every(v=> v===undefined || v===null || v==='');
      if(isBlank){
        if(tiendas.length>0) break; else continue;
      }
      const pdv = row[3];
      if(!pdv || String(pdv).trim()==='') continue;
      const clave = row[2] ? String(row[2]).trim() : '';
      const region = row[4] ? String(row[4]).trim() : '';
      const mes = normalizeMes(row[1]);
      const entregadoArq = row[16];
      const entregaImpresora = row[17];
      tiendas.push({
        numero: (row[0]!==undefined && row[0]!==null && row[0]!=='') ? Number(row[0]) : null,
        clave,
        nombre: String(pdv).trim(),
        mes,
        region: region || '-',
        pc: numOrDashExp(row[5]),
        lap: numOrDashExp(row[6]),
        hc: numOrDashExp(row[7]),
        pinpad: numOrDashExp(row[8]),
        dif_pinpad: numOrDashExp(row[9]),
        biometricos: numOrDashExp(row[10]),
        dif_biometricos: numOrDashExp(row[11]),
        prep_equipo: fmtCellExp(row[12]),
        envio_mac: fmtCellExp(row[13]),
        internet: row[14] ? String(row[14]).trim() : '-',
        solicitud_arq: fmtCellExp(row[15]),
        entregado_arq: entregadoArq ? String(entregadoArq).trim() : '-',
        entrega_impresora: fmtCellExp(entregaImpresora),
        modelo_impresora: row[18] ? String(row[18]).trim() : '-',
        estatus: computeEstatusExpansion(clave, region, mes, entregadoArq, entregaImpresora),
        nota: ''
      });
    }
    if(tiendas.length===0) throw new Error('No se encontraron filas de tiendas después del encabezado.');

    const abiertas = tiendas.filter(t=>t.estatus==='Abierta').length;
    const enProceso = tiendas.filter(t=>t.estatus==='En proceso').length;
    const prospecto = tiendas.filter(t=>t.estatus==='Prospecto').length;
    const esteMes = tiendas.filter(t=>t.estatus==='Abierta' && t.mes.startsWith(state.periodo_actual)).length;

    return { fileName, tiendas, resumen:{ total:tiendas.length, abiertas, enProceso, prospecto, esteMes } };
  }

  // Acumula (no reemplaza): las tiendas del archivo nuevo se agregan o actualizan por Clave PDV
  // (o por nombre si no tienen clave); las tiendas que ya estaban y no vienen en este archivo
  // se quedan tal cual (así funciona la carga semanal de "solo lo nuevo de esta semana").
  // Las notas manuales (por tienda y generales) nunca se tocan aquí.
  function aplicarDatosExpansion(datos){
    const existentes = state.expansion.tiendas || [];
    const keyOf = t => t.clave ? ('clave:'+t.clave) : ('nombre:'+t.nombre);
    const indexPorKey = {};
    existentes.forEach((t,i)=>{ indexPorKey[keyOf(t)] = i; });

    let agregadas = 0, actualizadas = 0;
    datos.tiendas.forEach(nuevo=>{
      const key = keyOf(nuevo);
      if(indexPorKey.hasOwnProperty(key)){
        const i = indexPorKey[key];
        const notaPrevia = existentes[i].nota || '';
        existentes[i] = { ...nuevo, nota: notaPrevia };
        actualizadas++;
      } else {
        existentes.push({ ...nuevo });
        indexPorKey[key] = existentes.length - 1;
        agregadas++;
      }
    });

    state.expansion.tiendas = existentes;
    state.expansion.carga = { archivo: datos.fileName, fecha: new Date().toISOString(), agregadas, actualizadas };
    cargaPendienteExpansion = null;
    save();
  }

  function handleFileUploadExpansion(e){
    const file = e.target.files[0];
    if(!file) return;
    const errBox = document.getElementById('uploadErrorExp');
    if(errBox) errBox.innerHTML = '';
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
        const sheetName = wb.SheetNames.find(n=>/hoja ?1|expansi/i.test(n)) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows2d = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:true});
        cargaPendienteExpansion = calcularDatosExpansion(rows2d, file.name);
        render();
      }catch(err){
        console.error(err);
        if(errBox) errBox.innerHTML = `<div class="upload-error">No se pudo procesar el archivo: ${err.message}</div>`;
      }finally{
        e.target.value = '';
      }
    };
    reader.onerror = ()=>{ if(errBox) errBox.innerHTML = '<div class="upload-error">No se pudo leer el archivo.</div>'; };
    reader.readAsArrayBuffer(file);
  }

  function cumulativo(prov){
    const hasta = idxMes(state.periodo_actual);
    const arr = state.tendencia.data[prov] || [];
    let s = 0; for(let i=0;i<=hasta;i++) s += Number(arr[i]||0);
    return s;
  }
  function estatusProveedor(caidas){
    if(caidas >= 150) return {cls:'crit', label:'CRÍTICO'};
    if(caidas >= 20) return {cls:'med', label:'MEDIO'};
    return {cls:'good', label:'BUENO'};
  }
  function estatusTienda(total){
    if(total >= 5) return {cls:'critica', label:'CRÍTICA'};
    if(total === 4) return {cls:'alerta', label:'ALERTA'};
    if(total >= 2) return {cls:'atencion', label:'ATENCIÓN'};
    if(total === 1) return {cls:'estable', label:'ESTABLE'};
    return {cls:'estable', label:'—'};
  }

  // ---------- YoY (TotalPlay / Telmex) ----------
  function renderYoy(c, prov){
    const hasta = idxMes(state.periodo_actual);
    const serie2026 = state.tendencia.data[prov];
    const serie2025 = state.yoy_2025[prov];

        <div class="card"><div class="head" style="background:#B39DDB">Año ${state.anio-1}</div>
          <div class="body"><div class="big">${serie2025.reduce((a,b)=>a+Number(b||0),0)}</div><div class="lbl">Caídas acumuladas (año completo)</div></div></div>
      </div>
      <div class="panel">
        <div class="editbar">${editing
          ? `<button id="btnCancel">Cancelar</button><button class="primary" id="btnSave">Guardar cambios</button>`
          : (canEdit ? `<button id="btnEdit">Editar ${state.anio-1} y notas</button>` : '')}</div>
        <h3>Comparativo mensual</h3>
        <canvas id="chartYoy"></canvas>
        ${notas.length ? `
        <div style="margin-top:14px; display:flex; flex-wrap:wrap; gap:8px;">
          ${notas.map((n,i)=>`
            <div style="font-size:12px; padding:6px 10px; border-radius:8px; background:${n.anio===state.anio-1?'#EDE7F6':'#F3E5F5'}; border:1px solid ${n.anio===state.anio-1?'#B39DDB':CARD_COLOR[prov]}; display:flex; align-items:center; gap:6px;">
              🚩 <b>${n.mes} ${n.anio}:</b> ${n.nota}
              ${editing ? `<button data-yoy-nota-remove="${i}" style="padding:1px 6px; margin-left:4px;">✕</button>` : ''}
            </div>`).join('')}
        </div>` : (editing ? '' : `<div class="foot" style="margin-top:10px;">Sin anotaciones en este comparativo todavía.</div>`)}
        ${editing ? `
        <div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--line);">
          <h3 style="margin-bottom:8px;">Agregar anotación</h3>
          <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
            <select id="notaMes">${MESES.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
            <select id="notaAnio"><option value="${state.anio-1}">${state.anio-1}</option><option value="${state.anio}">${state.anio}</option></select>
            <input type="text" id="notaTexto" placeholder="Ej. Migración de servicios" style="flex:1; min-width:220px; padding:6px 10px; border:1px solid var(--line); border-radius:6px;">
            <button id="btnAddNota">Agregar</button>
          </div>
        </div>` : ''}
      </div>
      ${editing ? `<div class="panel"><h3>Caídas ${prov} — año ${state.anio-1}</h3>
        <div style="overflow-x:auto;"><table><thead><tr>${MESES.map(m=>`<th>${m}</th>`).join('')}</tr></thead>
        <tbody><tr>${MESES.map((m,i)=>`<td><input type="number" min="0" data-yoy-idx="${i}" value="${serie2025[i]}"></td>`).join('')}</tr></tbody></table></div>
        <div class="foot">El año ${state.anio} se toma de la pestaña "Tendencia mensual" — no se edita aquí, para que ambos siempre coincidan.</div>
      </div>` : ''}
    `;
    if(editing){
      document.getElementById('btnCancel').onclick=()=>{editing=false;render();};
      document.getElementById('btnSave').onclick=()=>{
        document.querySelectorAll('input[data-yoy-idx]').forEach(i=>{ state.yoy_2025[prov][Number(i.dataset.yoyIdx)] = Number(i.value||0); });
        save();
      };
      document.querySelectorAll('[data-yoy-nota-remove]').forEach(btn=>{
        btn.onclick = ()=>{ notas.splice(Number(btn.dataset.yoyNotaRemove),1); render(); };
      });
      const btnAdd = document.getElementById('btnAddNota');
      if(btnAdd) btnAdd.onclick = ()=>{
        const mes = document.getElementById('notaMes').value;
        const anio = Number(document.getElementById('notaAnio').value);
        const texto = document.getElementById('notaTexto').value.trim();
        if(!texto) return;
        notas.push({anio, mes, nota:texto});
        render();
      };
    } else {
      if(canEdit) document.getElementById('btnEdit').onclick=()=>{editing=true;render();};
    }
    // Plugin de dibujo: pone una bandera roja arriba de la barra que tenga una nota para ese mes/año
    const banderaPlugin = {
      id:'banderasYoy',
      afterDatasetsDraw(chart){
        try{
          const ctx = chart.ctx;
          ctx.save();
          ctx.font = '14px sans-serif';
          ctx.textAlign = 'center';
          [state.anio-1, state.anio].forEach((anio,dsIdx)=>{
            const meta = chart.getDatasetMeta(dsIdx);
            if(!meta || !meta.data) return;
            MESES.forEach((mes,i)=>{
              const tieneNota = notas.some(n=>n.anio===anio && n.mes===mes);
              if(!tieneNota) return;
              const el = meta.data[i];
              if(!el) return;
              ctx.fillText('🚩', el.x, el.y - 8);
            });
          });
          ctx.restore();
        }catch(e){ /* no bloquear el render de la gráfica por un error de dibujo */ }
      }
    };
    charts.yoy = new Chart(document.getElementById('chartYoy'), {
      type:'bar',
      data:{ labels:MESES, datasets:[
        {label:String(state.anio-1), data:serie2025, backgroundColor:'#CBB6E8'},
        {label:String(state.anio), data:MESES.map((m,i)=> i<=hasta ? serie2026[i] : 0), backgroundColor:CARD_COLOR[prov]}
      ]},
      options:{responsive:true, plugins:{legend:{position:'bottom'}, tooltip:{ callbacks:{
        afterLabel(ctx){
          const anio = ctx.datasetIndex===0 ? state.anio-1 : state.anio;
          const mes = MESES[ctx.dataIndex];
          const n = notas.find(x=>x.anio===anio && x.mes===mes);
          return n ? '🚩 ' + n.nota : '';
        }
      }}}, scales:{y:{beginAtZero:true}}},
      plugins:[banderaPlugin]
    });
  }

        document.querySelectorAll('input[data-atn]').forEach(i=>{ r.atn[i.dataset.atn]=i.value; });

        const d=a[p];
        return `<div class="card"><div class="head" style="background:${CARD_COLOR[p]||'#66BB6A'}">${p}</div>

            <div class="big">${d.tickets}</div><div class="lbl">tickets</div><div class="rule"></div>

  // ---------- Top 15 tiendas ----------
  function renderTop(c, key, prov){
    const rows = state[key];
    c.innerHTML = `
      <div class="title">Top 15 tiendas con más caídas — ${prov} — Ene-${state.periodo_actual} ${state.anio}</div>
      <div class="subtitle">CRÍTICA ≥5 · ALERTA = 4 · ATENCIÓN 2-3 · ESTABLE = 1</div>
      <div class="editbar">${editing
        ? `<button id="btnCancel">Cancelar</button><button class="primary" id="btnSave">Guardar cambios</button>`
        : (canEdit ? `<button id="btnEdit">Editar tabla</button><button id="btnAddRow">Agregar tienda</button>` : '')}</div>
      ${rows.length===0 && !editing ? `
        <div class="placeholder">
          <h3>Todavía no hay datos capturados</h3>
          <p>No prellené esta tabla con las cifras del PPTX original porque, al extraer el archivo, el texto de esa tabla vino aplanado y no pude garantizar que cada número quedara en la fila/mes correcto — prefiero dejarla vacía a arriesgar un dato mal capturado en un reporte para el director.</p>
          <p>Da clic en <b>"Editar tabla"</b> y agrega tienda por tienda con su conteo mensual; el total y el estatus se calculan solos.</p>
        </div>` : renderTopTable(rows, editing)}
    `;
    if(editing){
      document.getElementById('btnCancel').onclick=()=>{editing=false;render();};
      document.getElementById('btnSave').onclick=()=>{
        document.querySelectorAll('[data-row]').forEach(row=>{
          const i = Number(row.dataset.row);
          const nameInp = row.querySelector('[data-field="nombre"]');
          if(nameInp) rows[i].nombre = nameInp.value;
          const carrierInp = row.querySelector('[data-field="carrier"]');
          if(carrierInp) rows[i].carrier = carrierInp.value;
          const tecInp = row.querySelector('[data-field="tecnologia"]');
          if(tecInp) rows[i].tecnologia = tecInp.value;
          rows[i].meses = rows[i].meses.map((_,mi)=> Number(row.querySelector(`[data-mes="${mi}"]`).value||0));
        });
        save();
      };
      document.getElementById('btnAddRow')?.remove();
      wireRemoveButtons(rows,key);
    } else {
      if(canEdit) document.getElementById('btnEdit').onclick=()=>{editing=true;render();};
      document.getElementById('btnAddRow').onclick=()=>{
        rows.push({nombre:'Nueva tienda', carrier:'', tecnologia:'', meses:new Array(7).fill(0)});
        editing = true; render();
      };
    }
  }
  function renderTopTable(rows, edit){
    const hasta = idxMes(state.periodo_actual);
    const mesesCortos = MESES.slice(0,hasta+1);
    const withTotals = rows.map((r,origIdx)=>({...r, total:r.meses.reduce((a,b)=>a+Number(b||0),0), _idx:origIdx}))
      .sort((a,b)=>b.total-a.total).slice(0,15);
    return `<div class="panel"><div style="overflow-x:auto;"><table>
      <thead><tr><th>#</th><th>Tienda</th><th>Carrier</th><th>Tecnología</th>${mesesCortos.map(m=>`<th>${m.slice(0,3)}</th>`).join('')}<th>Total</th><th>Estatus</th>${edit?'<th></th>':''}</tr></thead>
      <tbody>${withTotals.map((r,i)=>{
        const st = estatusTienda(r.total);
        return `<tr data-row="${r._idx}">
          <td>${i+1}</td>
          <td>${edit ? `<input type="text" style="width:200px;" data-field="nombre" value="${r.nombre}">` : r.nombre}</td>
          <td>${edit ? `<input type="text" style="width:80px;" data-field="carrier" value="${r.carrier||''}">` : (r.carrier||'—')}</td>
          <td>${edit ? `<input type="text" style="width:80px;" data-field="tecnologia" value="${r.tecnologia||''}">` : (r.tecnologia||'—')}</td>
          ${mesesCortos.map((m,mi)=> `<td>${edit ? `<input type="number" min="0" data-mes="${mi}" value="${r.meses[mi]||0}">` : (r.meses[mi]||'-')}</td>`).join('')}
          <td><b>${r.total}</b></td>
          <td><span class="status-badge ${st.cls}">${st.label}</span></td>
          ${edit?`<td><button data-remove="${r._idx}" style="padding:3px 8px;">✕</button></td>`:''}
        </tr>`;
      }).join('')}</tbody>
    </table></div>
    <div class="foot">Tienda, Carrier y Tecnología vienen del catálogo de tiendas (se empatan por el nombre "PRM TDA..." una vez quitado el alias del ticket). Si ves "—" es que ese nombre no está en el catálogo que me compartiste.</div>
    </div>`;
  }
  function wireRemoveButtons(rows,key){
    document.querySelectorAll('[data-remove]').forEach(btn=>{
      btn.onclick = () => { rows.splice(Number(btn.dataset.remove),1); render(); };
    });
  }

          ? `<button id="btnCancel">Cancelar</button><button id="btnAddTienda">Agregar tienda</button><button class="primary" id="btnSave">Guardar cambios</button>`
          : (canEdit ? `<button id="btnEdit">Editar todo</button>` : '')}</div>
        <h3>Tiendas — mes, hardware, internet y estatus</h3>
        <div style="overflow-x:auto;"><table>
          <thead><tr>
            <th>#</th><th>Clave PDV</th><th>Tienda</th><th>Región</th><th>Mes</th>
            <th>PC</th><th>Lap</th><th>Internet</th><th>ARQ</th><th>Impresora</th><th>Estatus</th><th style="text-align:left;">Nota</th>${editing?'<th></th>':''}
          </tr></thead>
          <tbody>${tiendas.map((t,i)=> editing ? `
            <tr data-exp-row="${i}">
              <td><input type="text" style="width:44px;" data-exp-field="numero" data-exp-row="${i}" value="${t.numero!==null && t.numero!==undefined ? t.numero : ''}"></td>
              <td><input type="text" style="width:110px;" data-exp-field="clave" data-exp-row="${i}" value="${t.clave||''}"></td>
              <td><input type="text" style="width:220px; text-align:left;" data-exp-field="nombre" data-exp-row="${i}" value="${(t.nombre||'').replace(/"/g,'&quot;')}"></td>
              <td><input type="text" style="width:90px;" data-exp-field="region" data-exp-row="${i}" value="${t.region||''}"></td>
              <td><input type="text" style="width:80px;" data-exp-field="mes" data-exp-row="${i}" value="${t.mes||''}"></td>
              <td><input type="text" style="width:36px;" data-exp-field="pc" data-exp-row="${i}" value="${t.pc||''}"></td>
              <td><input type="text" style="width:36px;" data-exp-field="lap" data-exp-row="${i}" value="${t.lap||''}"></td>
              <td><input type="text" style="width:70px;" data-exp-field="internet" data-exp-row="${i}" value="${t.internet||''}"></td>
              <td><input type="text" style="width:80px;" data-exp-field="entregado_arq" data-exp-row="${i}" value="${t.entregado_arq||''}"></td>
              <td><input type="text" style="width:80px;" data-exp-field="entrega_impresora" data-exp-row="${i}" value="${t.entrega_impresora||''}"></td>
              <td><select data-exp-field="estatus" data-exp-row="${i}">
                ${['Abierta','En proceso','Prospecto','Cerrada'].map(op=>`<option value="${op}" ${t.estatus===op?'selected':''}>${op}</option>`).join('')}
              </select></td>
              <td><input type="text" style="width:220px; text-align:left;" data-exp-field="nota" data-exp-row="${i}" value="${(t.nota||'').replace(/"/g,'&quot;')}"></td>
              <td><button data-exp-remove="${i}" style="padding:3px 8px;">✕</button></td>
            </tr>` : `
            <tr data-exp-row="${i}">
              <td>${t.numero!==null && t.numero!==undefined ? t.numero : '—'}</td>
              <td>${t.clave||'—'}</td>
              <td style="text-align:left;">${t.nombre}</td>
              <td>${t.region}</td>
              <td>${t.mes||'—'}</td>
              <td>${t.pc}</td>
              <td>${t.lap}</td>
              <td>${t.internet}</td>
              <td>${t.entregado_arq}</td>
              <td>${t.entrega_impresora}</td>
              <td><span class="status-badge ${estatusExpClass(t.estatus)}">${t.estatus}</span></td>
              <td style="text-align:left;">${t.nota||'<span style="color:var(--sub)">—</span>'}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      </div>
      <div class="panel">
        <h3>Notas generales de expansión</h3>
        ${editing
          ? `<textarea id="notasGenerales" rows="6" style="width:100%; font-family:inherit; font-size:13px; padding:10px; border:1px solid var(--line); border-radius:8px;" placeholder="Ejemplo: Tienda CITY SHOP — cierre de tienda para el 03 de agosto">${exp.notas_generales||''}</textarea>`
          : `<div style="font-size:13px; white-space:pre-wrap; color:${exp.notas_generales ? 'var(--ink)' : 'var(--sub)'};">${exp.notas_generales || 'Sin notas capturadas todavía. Da clic en "Editar todo" arriba para agregar.'}</div>`}
        <div class="foot">Espacio libre para movimientos que no vienen en el archivo (cierres, cambios de plaza, pausas, etc.). No se sobreescribe al cargar un nuevo Excel.</div>
      </div>
      <div class="foot">En modo edición puedes cambiar cualquier campo de la tabla, agregar tiendas manualmente o quitarlas. Al cargar un archivo nuevo, esos cambios manuales se respetan salvo que ese mismo campo venga distinto en el Excel para esa Clave PDV.</div>
    `;
    if(editing){
      document.getElementById('btnCancel').onclick=()=>{editing=false;render();};
      document.getElementById('btnAddTienda').onclick=()=>{
        tiendas.push({numero:null, clave:'', nombre:'Nueva tienda', mes:'', region:'-', pc:'-', lap:'-', hc:'-', pinpad:'-', dif_pinpad:'-', biometricos:'-', dif_biometricos:'-', prep_equipo:'-', envio_mac:'-', internet:'-', solicitud_arq:'-', entregado_arq:'-', entrega_impresora:'-', modelo_impresora:'-', estatus:'Prospecto', nota:''});
        render();
      };
      document.getElementById('btnSave').onclick=()=>{
        document.querySelectorAll('[data-exp-field]').forEach(inp=>{
          const i = Number(inp.dataset.expRow);
          const field = inp.dataset.expField;
          let val = inp.value;
          if(field==='numero') val = val==='' ? null : Number(val);
          tiendas[i][field] = val;
        });
        const ng = document.getElementById('notasGenerales');
        if(ng) exp.notas_generales = ng.value;
        save();
      };
      document.querySelectorAll('[data-exp-remove]').forEach(btn=>{
        btn.onclick = ()=>{ tiendas.splice(Number(btn.dataset.expRemove),1); render(); };
      });
    } else {
      if(canEdit) document.getElementById('btnEdit').onclick=()=>{editing=true;render();};
    }
    wireExpansionUpload();
  }
  function panelConfirmacionExpansion(){
    const d = cargaPendienteExpansion;
    const existentes = state.expansion.tiendas || [];
    const keyOf = t => t.clave ? ('clave:'+t.clave) : ('nombre:'+t.nombre);
    const clavesExistentes = new Set(existentes.map(keyOf));
    const nuevas = d.tiendas.filter(t=>!clavesExistentes.has(keyOf(t))).length;
    const actualizan = d.tiendas.length - nuevas;
    return `<div class="panel" style="border-color:var(--tm);">
      <h3 style="color:var(--tm);">Confirmar carga · ${d.fileName}</h3>
      <div style="font-size:13px; line-height:1.8;">
        Filas en el archivo: <b>${d.resumen.total}</b> → <b>${nuevas} tiendas nuevas</b> se agregarán, <b>${actualizan}</b> ya existían y se actualizarán.<br>
        En el archivo: Abiertas <b>${d.resumen.abiertas}</b> · En proceso <b>${d.resumen.enProceso}</b> · Prospecto <b>${d.resumen.prospecto}</b>
      </div>
      <div class="foot">No se borra nada de lo que ya tenías. Las notas manuales que ya hayas escrito se conservan (se empatan por Clave PDV, o por nombre si no tiene clave).</div>
      <div class="editbar" style="margin-top:10px;">
        <button id="btnCancelCargaExp">Cancelar</button>
        <button class="primary" id="btnAplicarCargaExp">Aplicar datos</button>
      </div>
    </div>`;
  }
  function wireExpansionUpload(){
    const btn = document.getElementById('btnUploadExp');
    if(btn) btn.onclick = () => document.getElementById('fileExpansion').click();
    const inp = document.getElementById('fileExpansion');
    if(inp) inp.onchange = handleFileUploadExpansion;
    const btnCancel = document.getElementById('btnCancelCargaExp');
    if(btnCancel) btnCancel.onclick = ()=>{ cargaPendienteExpansion = null; render(); };
    const btnAplicar = document.getElementById('btnAplicarCargaExp');
    if(btnAplicar) btnAplicar.onclick = ()=>{ aplicarDatosExpansion(cargaPendienteExpansion); };
  }

  window.initCaidasApp = function(role){
    canEdit = (role === 'admin');
    load();
  };
})();
</script>
</body>
</html>
